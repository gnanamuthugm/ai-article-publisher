name: Daily CCAIP Blog Publisher

on:
  schedule:
    - cron: '0 6 * * *'   # Runs every day at 11:30 AM IST
    # Script itself handles alternate-day logic (post → skip → post → skip)
  workflow_dispatch:        # Manual trigger when needed

# Prevent duplicate runs on the same day
concurrency:
  group: daily-publish-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog article (odd days only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          echo "=== TODAY'S DATE (UTC): $(date) ==="
          echo "=== IST DATE: $(TZ='Asia/Kolkata' date) ==="
          node scripts/generate-daily-blog.js

      - name: Commit and push article
        run: |
          git config user.name "CCAIP Daily Bot"
          git config user.email "bot@ccaip-daily.com"
          git add data/articles.json data/publish-state.json content/articles/ || true
          git diff --staged --quiet || git commit -m "📚 article: $(date +'%Y-%m-%d')"
          git push origin main

      - name: Post to LinkedIn (alternate days)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          BLOG_BASE_URL: ${{ secrets.BLOG_BASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: node scripts/post-to-linkedin.js

      - name: Commit LinkedIn log
        run: |
          git add data/linkedin-posts.json || true
          git diff --staged --quiet || git commit -m "📣 linkedin: $(date +'%Y-%m-%d')"
          git push origin main || true
