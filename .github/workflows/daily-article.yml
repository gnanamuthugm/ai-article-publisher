name: Daily CCAIP Blog Publisher

on:
  schedule:
    - cron: '0 6 * * *'   # 11:30 AM IST every day (IST = UTC+5:30)
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Step 1: Generate today's blog article
      - name: Generate today's blog article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/generate-daily-blog.js

      # Step 2: Commit blog article to GitHub (triggers Vercel deploy)
      - name: Commit and push blog article
        run: |
          git config user.name "CCAIP Daily Bot"
          git config user.email "bot@ccaip-daily.com"
          git add data/articles.json content/articles/ data/linkedin-posts.json || true
          git diff --staged --quiet || git commit -m "📚 Daily article - $(date +'%Y-%m-%d')"
          git push

      # Step 3: Post to LinkedIn (teaser only, different content from blog)
      - name: Post teaser to LinkedIn
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          BLOG_BASE_URL: ${{ secrets.BLOG_BASE_URL }}
        run: node scripts/post-to-linkedin.js

      # Step 4: Commit LinkedIn post log
      - name: Commit LinkedIn post log
        run: |
          git add data/linkedin-posts.json || true
          git diff --staged --quiet || git commit -m "📣 LinkedIn post log - $(date +'%Y-%m-%d')"
          git push || true
