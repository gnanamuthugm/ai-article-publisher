name: CCAIP Blog Publisher (Odd Days Only)

on:
  schedule:
    - cron: '0 4 1-31/2 * *'   # Runs ONLY on odd dates (1,3,5...31) at 9:30 AM IST
  workflow_dispatch:             # Manual trigger when needed

# Prevent duplicate runs on the same day
concurrency:
  group: daily-publish-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Install canvas dependencies (needed for Instagram image generation)
      - name: Install canvas system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Generate blog article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          echo "=== TODAY'S DATE (UTC): $(date) ==="
          echo "=== IST DATE: $(TZ='Asia/Kolkata' date) ==="
          node scripts/generate-daily-blog.js

      - name: Commit and push article
        run: |
          git config user.name "CCAIP Daily Bot"
          git config user.email "bot@ccaip-daily.com"
          git add data/articles.json data/publish-state.json content/articles/ || true
          git diff --staged --quiet || git commit -m "📚 article: $(date +'%Y-%m-%d')"
          git push origin main

      - name: Post to LinkedIn
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          BLOG_BASE_URL: ${{ secrets.BLOG_BASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: node scripts/post-to-linkedin.js

      - name: Commit LinkedIn log
        run: |
          git add data/linkedin-posts.json || true
          git diff --staged --quiet || git commit -m "📣 linkedin: $(date +'%Y-%m-%d')"
          git push origin main || true

      # ── Instagram: runs ONLY after LinkedIn post succeeds ──────────────────
      # Key rule: Instagram post only on LinkedIn + Website publish days.
      # The post-to-instagram.js script checks data/linkedin-posts.json
      # to verify LinkedIn posted today before proceeding.
      - name: Install canvas npm package
        run: npm install canvas --save
        continue-on-error: true

      - name: Post to Instagram
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: node scripts/post-to-instagram.js

      - name: Commit Instagram log
        run: |
          git add data/instagram-posts.json data/instagram-images/ || true
          git diff --staged --quiet || git commit -m "📸 instagram: $(date +'%Y-%m-%d')"
          git push origin main || true
